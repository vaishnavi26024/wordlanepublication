<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestsellers - Word Lane Publication</title>
    <link rel="icon" type="image/png" href="../images/logo.png" sizes="96x96" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #e9f0f8, #c9d6e8);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #1b3fa0;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            margin-bottom: 30px;
            transition: background 0.3s;
        }
        
        .back-btn:hover {
            background: #0f2870;
        }
        
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .header h1 {
            font-size: 3rem;
            color: #1b3fa0;
            margin-bottom: 10px;
        }
        
        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }
        
        .book-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .book-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .book-image-wrapper {
            width: 100%;
            height: 400px;
            overflow: hidden;
        }
        
        .book-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .book-info {
            display: none;
        }
        
        .book-title {
            font-size: 1.2rem;
            color: #1b3fa0;
            margin-bottom: 6px;
            font-weight: 600;
        }
        
        .book-author {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 10px;
        }
        
        .book-price {
            font-size: 1.5rem;
            color: #1b3fa0;
            font-weight: bold;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
            }
            
            .book-image-wrapper {
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html?return=publish" class="back-btn">← Back to Home</a>
        
        <div class="header">
            <h1>Bestsellers</h1>
        </div>
        
        <div class="books-grid">
            <div class="book-card" onclick="window.open('https://amzn.in/d/03zAHFoL', '_blank')">
                <div class="book-image-wrapper">
                    <img src="../../images/melancholy.jpeg" alt="Melancholy" class="book-image">
                </div>
                <div class="book-info">
                    <h3 class="book-title">Melancholy</h3>
                    <p class="book-author">by Deepa Sharma</p>
                    <div class="book-price">₹299</div>
                </div>
            </div>
            
            <div class="book-card" onclick="window.open('https://amzn.in/d/09Doy9kP', '_blank')">
                <div class="book-image-wrapper">
                    <img src="../../images/lessons-mask.jpeg" alt="Lessons Behind The Mask" class="book-image">
                </div>
                <div class="book-info">
                    <h3 class="book-title">Lessons Behind The Mask</h3>
                    <p class="book-author">by Ambalika Bharadwaj</p>
                    <div class="book-price">₹349</div>
                </div>
            </div>
            
            <div class="book-card" onclick="window.open('https://amzn.in/d/0cV8HXYD', '_blank')">
                <div class="book-image-wrapper">
                    <img src="../../images/aadivichay.jpeg" alt="आदिवोच्य" class="book-image">
                </div>
                <div class="book-info">
                    <h3 class="book-title">आदिवोच्य</h3>
                    <p class="book-author">by अदिति सिन्हा</p>
                    <div class="book-price">₹399</div>
                </div>
            </div>
            
            <div class="book-card" onclick="window.open('https://amzn.in/d/0dU1zj55', '_blank')">
                <div class="book-image-wrapper">
                    <img src="../../images/thelike.jpeg" alt="The Beautiful Life" class="book-image">
                </div>
                <div class="book-info">
                    <h3 class="book-title">The Beautiful Life</h3>
                    <p class="book-author">by Multiple Authors</p>
                    <div class="book-price">₹279</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
