<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Health & Fitness | Word Lane Publication</title>

    <link rel="icon" href="../images/logo.png" />

    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #0a1a3a;
            color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #d1d5db;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 30px;
        }

        .card {
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            color: #000;
            padding-top: 10%;

        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: contain;
            /* prevents cropping */
            background: #f3f4f6;
        }

        .card-body {
            padding: 15px;
        }

        .btn {
            margin-top: 10px;
            display: inline-block;
            padding: 8px 16px;
            background: #3b82f6;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn:hover {
            background: #22c55e;
        }
    </style>
</head>

<body>
    <a href="discover-books.html" style="position: absolute; top: 20px; left: 20px; font-size: 2.5rem; color: white; text-decoration: none; font-weight: bold;">←</a>
    <div class="container">
        <h1>Health & Fitness</h1>

        <p class="subtitle">
            Books related to wellbeing, relationships and mental health.
        </p>

        <div class="grid">
            <div class="card">
                <img src="https://m.media-amazon.com/images/I/41XssHh9zEL._SY445_SX342_FMwebp_.jpg" />
                <div class="card-body">
                    <h3>Zindagi Muskurane Ka Naam Hai</h3>
                    <a href="#" class="btn">View Book</a>
                </div>
            </div>

            <div class="card">
                <img src="https://m.media-amazon.com/images/I/81G1jPrzxFL._SY466_.jpg" />
                <div class="card-body">
                    <h3>Shaadi Ke Baad Bhi Pyaar Kaise Zinda Rakhein</h3>
                    <a href="#" class="btn">View Book</a>
                </div>
            </div>

            <div class="card">
                <img src="https://m.media-amazon.com/images/I/71ZFNsyQnsL._SY466_.jpg" />
                <div class="card-body">
                    <h3>Karodon Patniyan Apne Patiyon Ke Dil Ko Kaise Jeeten</h3>
                    <a href="#" class="btn">View Book</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
