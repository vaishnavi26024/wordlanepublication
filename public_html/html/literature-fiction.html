<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literature & Fiction | Word Lane Publication</title>
    <link rel="icon" href="../images/logo.png" />

    <style>
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: #0a1a3a;
            color: #ffffff;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 60px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #d1d5db;
            margin-bottom: 40px;
        }

        .grid {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px 80px 20px;

            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        /* tablet */
        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .book {
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            color: #000;

            padding-top: 10%;
        }

        .book img {
            width: 100%;
            height: 320px;
            /* slightly taller */
            object-fit: contain;
            /* shows full book cover */
            background: #f3f4f6;
            /* neutral background like Amazon */
        }

        .book-body {
            padding: 15px;
        }

        .btn {
            margin-top: 10px;
            display: inline-block;
            padding: 8px 16px;
            background: #3b82f6;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

        .btn:hover {
            background: #22c55e;
        }
    </style>
</head>

<body>
    <a href="discover-books.html"
