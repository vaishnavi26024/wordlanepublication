<link rel="stylesheet" href="../css/styles.css">

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link rel="stylesheet" href="../css/styles.css">

<style>
body{
background: radial-gradient(circle at top,#0b2c5f,#031a3a);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
color:white;
}
.auth-card{
width:380px;
padding:40px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
box-shadow:0 15px 40px rgba(0,0,0,0.6);
}
.auth-card h2{
text-align:center;
margin-bottom:25px;
}
.input-group{
margin-bottom:15px;
}
.input-group input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:transparent;
color:white;
}
.auth-btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#27ae60;
color:white;
font-size:16px;
cursor:pointer;
}
.auth-btn:hover{
background:#1f944f;
}
.forgot{
text-align:right;
font-size:13px;
margin-bottom:10px;
}
.hidden{
display:none;
}
.link{
text-align:center;
margin-top:15px;
font-size:14px;
}
.link a{
color:#4da3ff;
cursor:pointer;
}
</style>
</head>
<body class="auth-page">
    <!-- BACK TO HOME BUTTON -->
<a href="../index.html" class="home-btn-fixed">Back To Home</a>
<div class="auth-card">

<!-- LOGIN -->

<div id="loginView">
<h2>Welcome Back</h2>

<div class="input-group">
<input type="text" placeholder="Email or Mobile Number">
</div>

<div class="input-group">
<input type="password" placeholder="Password">
</div>

<div class="forgot">
<a onclick="showReset()">Forgot Password?</a>
</div>

<button class="auth-btn">Login</button>

<div class="link">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>
</div>

<!-- RESET PASSWORD -->

<div id="resetView" class="hidden">
<h2>Reset Password</h2>
<p style="font-size:14px;color:#ccc">
Enter your registered email or phone
</p>
<div class="input-group">
<input type="text" placeholder="Email or Mobile Number">
</div>
<button class="auth-btn">Send OTP</button>
<div class="link">
<a onclick="showLogin()">Back to Login</a>
</div>
</div>
</div>
<script>
function showReset(){
document.getElementById("loginView").classList.add("hidden");
document.getElementById("resetView").classList.remove("hidden");
}
function showLogin(){
document.getElementById("resetView").classList.add("hidden");
document.getElementById("loginView").classList.remove("hidden");
}
</script>
</body>
</html>
